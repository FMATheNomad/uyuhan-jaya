version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: minicrane
      POSTGRES_PASSWORD: minicrane_secret
      POSTGRES_DB: minicrane
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minicrane"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://minicrane:minicrane_secret@db:5432/minicrane
      ENV: production
      CORS_ORIGINS: https://minicrane.com
      FRONTEND_URL: https://minicrane.com
      BACKEND_URL: https://minicrane.com
    volumes:
      - minicrane_data:/app/data
      - minicrane_uploads:/app/uploads
      - minicrane_wa_auth:/app/whatsapp-service/auth
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  minicrane_data:
  minicrane_uploads:
  minicrane_wa_auth:
